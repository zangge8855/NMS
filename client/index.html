<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="NMS - Next-generation multi-node 3x-ui cluster management panel" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0e17" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#eef2f7" />
    <meta property="og:title" content="NMS" />
    <meta property="og:description" content="Next-generation multi-node 3x-ui cluster management panel" />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/png" href="./nms-logo.png" />
    <link rel="apple-touch-icon" href="./nms-logo.png" />
    <title>NMS</title>
    <script>
      (() => {
        const light = window.matchMedia('(prefers-color-scheme: light)').matches;
        const theme = light ? 'light' : 'dark';
        const root = document.documentElement;
        root.dataset.theme = theme;
        root.dataset.themeMode = 'auto';
        root.style.colorScheme = theme;
        root.style.backgroundColor = light ? '#eef2f7' : '#0a0e17';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
